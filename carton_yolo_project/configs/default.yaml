paths:
  cvat_export_dir: data/external/cvat_export
  dataset_dir: data/dataset
  demo_dir: data/demo
  logs_dir: logs
  runs_dir: runs
  outputs_dir: outputs

dataset:
  seed: 42
  train_ratio: 0.80
  val_ratio: 0.20
  image_extensions:
    - .jpg
    - .jpeg
    - .png
    - .bmp
    - .webp
  label_extension: .txt
  class_names:
    - carton_pack
  expected_class_ids:
    - 0

training:
  model: yolo11n.pt
  epochs: 60
  imgsz: 640
  batch: 16
  workers: 8
  patience: 20
  device: "0"
  project_subdir: detect
  run_name: carton_pack_baseline
  cache: false
  pretrained: true
  amp: true

inference:
  default_weights: runs/detect/carton_pack_baseline/weights/best.pt
  conf: 0.35
  iou: 0.45
  imgsz: 640
  device: "0"
  webcam_source: 0
  save: true
  save_txt: true
  line_width: 2

export:
  default_weights: runs/detect/carton_pack_baseline/weights/best.pt
  format: onnx
  imgsz: 640
  dynamic: true
  half: false
  simplify: true
  opset: 12

logging:
  level: INFO
